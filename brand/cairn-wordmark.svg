<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <!-- dprplx cairn + wordmark — horizontal lockup -->
  <!-- Requires Geist font. For portable/print use, open in Figma or Illustrator
       and convert text to outlines (Type → Create Outlines). -->
  <rect width="1200" height="400" fill="#0a0a0a"/>

  <!-- Cairn mark scaled to fill left portion, vertically centred -->
  <g transform="translate(24 24) scale(0.688)">
    <ellipse cx="256" cy="360" rx="216" ry="72" stroke="#0F62FE" stroke-width="16"/>
    <ellipse cx="256" cy="232" rx="160" ry="56" stroke="#87B1FF" stroke-width="16"/>
    <ellipse cx="256" cy="128" rx="104" ry="48" stroke="#FFFFFF"  stroke-width="16"/>
  </g>

  <!-- Wordmark, vertically centred at x=440 -->
  <text
    x="448"
    y="200"
    dominant-baseline="middle"
    font-family="Geist, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="200"
    font-size="140"
    letter-spacing="22"
    fill="#FFFFFF"
  >dprplx</text>
</svg>
