<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- dprplx cairn mark — standalone icon -->
  <!-- Dark rounded square background -->
  <rect width="512" height="512" rx="80" fill="#0a0a0a"/>

  <!-- Bottom stone — IBM blue #0F62FE, widest -->
  <ellipse cx="256" cy="360" rx="216" ry="72" stroke="#0F62FE" stroke-width="16"/>

  <!-- Middle stone — #87B1FF (exact midpoint: white ↔ IBM blue), medium -->
  <ellipse cx="256" cy="232" rx="160" ry="56" stroke="#87B1FF" stroke-width="16"/>

  <!-- Top stone — white, narrowest -->
  <ellipse cx="256" cy="128" rx="104" ry="48" stroke="#FFFFFF"  stroke-width="16"/>
</svg>
